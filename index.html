<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/my-portfolio/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yu Jin Wong · Portfolio</title>

    <script>
      (function () {
        try {
          var stored = localStorage.getItem("portfolio-theme");
          var theme = stored === "light" || stored === "dark" ? stored : "dark";
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    />

    <!-- Critical paint styles: avoid FOUC before the Vite CSS bundle arrives -->
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      html[data-theme="dark"], html:not([data-theme]) {
        background: #080c10;
        color: #e6edf3;
      }
      html[data-theme="light"] {
        background: #eef3f8;
        color: #101820;
      }
      #root { min-height: 100vh; }
    </style>
    <script type="module" crossorigin src="/my-portfolio/assets/index-JKc7r9fH.js"></script>
    <link rel="stylesheet" crossorigin href="/my-portfolio/assets/index-BYTKJQIg.css">
  </head>

  </body>
</html>
